<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="speakerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A7BC8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 背景光晕 -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- 音箱主体 - 圆角方形 -->
  <rect x="70" y="50" width="60" height="100" rx="15" fill="url(#speakerGradient)"/>
  
  <!-- 音箱顶部高光 -->
  <rect x="70" y="50" width="60" height="25" rx="15" fill="#7FC4FF" opacity="0.5"/>
  <ellipse cx="100" cy="62" rx="25" ry="8" fill="#9DD5FF" opacity="0.4"/>
  
  <!-- 音箱右侧阴影（光源从左上来）-->
  <path d="M 115 65 L 130 65 L 130 135 L 115 135 Q 118 100 115 65" fill="#000000" opacity="0.25"/>
  
  <!-- 音箱左侧高光 -->
  <path d="M 70 65 L 70 135 L 78 130 L 78 70 Z" fill="#ffffff" opacity="0.2"/>
  
  <!-- 音箱底部阴影 -->
  <rect x="70" y="130" width="60" height="20" rx="15" fill="#000000" opacity="0.2"/>
  
  <!-- 音箱底座 -->
  <ellipse cx="100" cy="152" rx="32" ry="5" fill="#1A3A5A" opacity="0.5"/>
  <ellipse cx="100" cy="151" rx="28" ry="3" fill="#2E5F8F" opacity="0.3"/>
  
  <!-- 音箱网格孔 - 横向条纹设计 -->
  <g opacity="0.3">
    <!-- 横向条纹 - 更现代的设计 -->
    <rect x="80" y="85" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="90" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="95" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="100" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="105" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="110" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
    <rect x="80" y="115" width="40" height="1.5" rx="0.75" fill="#1A3A5A"/>
  </g>
  
  <!-- 细微的竖向分隔线 -->
  <g opacity="0.15">
    <rect x="92" y="82" width="0.8" height="36" fill="#1A3A5A"/>
    <rect x="107" y="82" width="0.8" height="36" fill="#1A3A5A"/>
  </g>
  
  <!-- 顶部触摸控制区域 - RGB 灯效果 -->
  <g opacity="0.9">
    <circle cx="88" cy="62" r="2.5" fill="#FF6B6B"/>
    <circle cx="88" cy="62" r="4" fill="#FF6B6B" opacity="0.3"/>
    
    <circle cx="100" cy="62" r="2.5" fill="#6BFF6B"/>
    <circle cx="100" cy="62" r="4" fill="#6BFF6B" opacity="0.3"/>
    
    <circle cx="112" cy="62" r="2.5" fill="#6B9BFF"/>
    <circle cx="112" cy="62" r="4" fill="#6B9BFF" opacity="0.3"/>
  </g>
  
  <!-- 中央声波图案 - 音频波形 -->
  <g transform="translate(100, 100)">
    <!-- 声波条 - 中心对称排列，缩小尺寸 -->
    <rect x="-1.5" y="-12" width="3" height="24" rx="1.5" fill="#ffffff" opacity="0.7"/>
    
    <rect x="-7" y="-9" width="3" height="18" rx="1.5" fill="#ffffff" opacity="0.65"/>
    <rect x="4" y="-9" width="3" height="18" rx="1.5" fill="#ffffff" opacity="0.65"/>
    
    <rect x="-12.5" y="-6" width="3" height="12" rx="1.5" fill="#ffffff" opacity="0.55"/>
    <rect x="9.5" y="-6" width="3" height="12" rx="1.5" fill="#ffffff" opacity="0.55"/>
    
    <rect x="-18" y="-4" width="3" height="8" rx="1.5" fill="#ffffff" opacity="0.45"/>
    <rect x="15" y="-4" width="3" height="8" rx="1.5" fill="#ffffff" opacity="0.45"/>
    
    <!-- 小装饰点 - 更小 -->
    <circle cx="-22" cy="0" r="1.5" fill="#FFB84D" opacity="0.6"/>
    <circle cx="22" cy="0" r="1.5" fill="#FFB84D" opacity="0.6"/>
  </g>
  
  <!-- 声波扩散效果 - 左侧 -->
  <g opacity="0.75">
    <path d="M 58 100 Q 61 90 64 100 Q 61 110 58 100" stroke="#FF6B6B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 52 100 Q 55 84 58 100 Q 55 116 52 100" stroke="#FFB84D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 46 100 Q 49 78 52 100 Q 49 122 46 100" stroke="#FFC966" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- 声波扩散效果 - 右侧 -->
  <g opacity="0.75">
    <path d="M 142 100 Q 139 90 136 100 Q 139 110 142 100" stroke="#FF6B6B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 148 100 Q 145 84 142 100 Q 145 116 148 100" stroke="#FFB84D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 154 100 Q 151 78 148 100 Q 151 122 154 100" stroke="#FFC966" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4A90E2" text-anchor="middle">XiaoAI Media</text>
</svg>