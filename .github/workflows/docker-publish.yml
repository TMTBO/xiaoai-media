name: Build and Publish Docker Image

on:
  push:
    branches:
      - 'master'
      - 'feature/**'
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push Docker image (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep -o '"version": *"[^"]*"' frontend/package.json | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate beta tag for feature branch
        id: beta_tag
        if: startsWith(github.ref, 'refs/heads/feature/')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="${{ github.ref_name }}"
          
          # Get the count of commits on this branch to use as beta number
          COMMIT_COUNT=$(git rev-list --count HEAD ^origin/master 2>/dev/null || echo "1")
          
          BETA_TAG="${VERSION}-beta${COMMIT_COUNT}"
          echo "tag=$BETA_TAG" >> $GITHUB_OUTPUT

      - name: Generate master tag
        id: master_tag
        if: github.ref == 'refs/heads/master'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          MASTER_TAG="${VERSION}-dev-${SHORT_SHA}"
          echo "tag=$MASTER_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.beta_tag.outputs.tag }},enable=${{ startsWith(github.ref, 'refs/heads/feature/') }}
            type=raw,value=${{ steps.master_tag.outputs.tag }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image as artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Compress Docker image
        run: gzip image.tar

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: image.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
